# docker-compose.yml
# =====================================================
# Docker Compose สำหรับ Booking App 2025
# Frontend (Nginx) + Backend (Node.js + SQLite)
# =====================================================

services:

  # ─── Backend API + SQLite ─────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: booking-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      BACKEND_PORT: 5000
      DB_PATH: /app/data/booking.db
    ports:
      - "5001:5000"
    volumes:
      - sqlite_data:/app/data
    networks:
      - booking-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── Frontend Web ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: booking-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - booking-net

# =====================================================
# Networks — ใช้ network เดิมที่สร้างแล้ว
# =====================================================
networks:
  booking-net:
    external: true
    name: booking-network

# =====================================================
# Volumes — SQLite database เก็บข้อมูลข้าม container restart
# =====================================================
volumes:
  sqlite_data:
    driver: local
    name: booking-sqlite-data
